name: Build & Release

# Triggered by release tags (plain vX.Y.Z — no suffix). Checkpoint tags
# like v2.34.1-runnable-by-claude are intentionally skipped.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  # Manual run from the Actions tab — uploads a build artifact instead
  # of creating a Release. Useful for shaking down the pipeline.
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        type: choice
        default: demo
        options: [demo, dbg, eda, auto, prod]

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    runs-on: windows-latest
    # Windows runner. The mingw64 DOSBox-X build (2026.05.02 and 2026.06.02)
    # crashes mid-compile; the VS Build (vsbuild-win64) uses a different
    # toolchain and is not affected.

    env:
      # Bump when DOSBox-X cuts a new release worth tracking.
      # https://github.com/joncampbell123/dosbox-x/releases
      DOSBOX_X_VERSION: '2026.06.02'
      BUILD_VARIANT: ${{ inputs.variant || 'demo' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install DOSBox-X (VS Build portable zip)
        shell: pwsh
        run: |
          $version = $env:DOSBOX_X_VERSION
          $url = "https://github.com/joncampbell123/dosbox-x/releases/download/dosbox-x-v$version/dosbox-x-vsbuild-win64-$version-portable.zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile dosbox-x.zip
          Expand-Archive dosbox-x.zip -DestinationPath dosbox-x-install -Force
          $exe = Get-ChildItem dosbox-x-install -Recurse -Filter dosbox-x.exe | Select-Object -First 1
          if (-not $exe) { Write-Error "dosbox-x.exe not found after extraction"; exit 1 }
          "DOSBOX_X=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Using: $($exe.FullName)"

      - name: Point dosbox-x.conf mount at the CI workspace
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE -replace '\\', '/'
          $conf = Get-Content dosbox-x.conf
          $conf = $conf | ForEach-Object {
            if ($_ -match '^mount c ') { "mount c `"$workspace`"" } else { $_ }
          }
          $conf | Set-Content dosbox-x.conf
          Write-Host "Active mount line:"
          Select-String '^mount c ' dosbox-x.conf

      - name: Build (${{ env.BUILD_VARIANT }} variant)
        timeout-minutes: 15
        shell: pwsh
        run: |
          $env:MAKE_HEADLESS_DEBUG = '1'
          .\build.ps1 $env:BUILD_VARIANT
          $rc = $LASTEXITCODE
          Write-Host "build.ps1 exit code: $rc"
          exit $rc

      - name: Diagnostics on build failure
        if: failure()
        shell: pwsh
        run: |
          Write-Host '=== build.log (full, if present) ==='
          if (Test-Path build.log) {
            Write-Host "size: $((Get-Item build.log).Length) bytes"
            Get-Content build.log
          } else { Write-Host '(missing)' }
          Write-Host ''
          Write-Host '=== dosbox-x stderr/stdout (if captured) ==='
          if (Test-Path dosbox-x-build.log) {
            Get-Content dosbox-x-build.log
          } else { Write-Host '(missing)' }
          Write-Host ''
          Write-Host '=== dosbox-x.conf (post-mount-rewrite) ==='
          Get-Content dosbox-x.conf
          Write-Host ''
          Write-Host '=== workspace contents ==='
          Get-ChildItem -Force | Select-Object Mode,LastWriteTime,Length,Name

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-${{ github.run_id }}
          path: |
            build.log
            dosbox-x-build.log
            dosbox-x.conf
          if-no-files-found: warn
          retention-days: 7

      - name: Verify essential build artifacts
        shell: pwsh
        run: |
          $required = @(
            'st\bin\st.exe',
            'st\bin\help.dat',
            'st\bin\RES.DAT'
          )
          foreach ($p in $required) {
            if (-not (Test-Path $p)) { Write-Error "Missing: $p"; exit 1 }
            Write-Host "OK  $p"
          }
          $dlls = Get-ChildItem st\bin -Filter 'pr_*.dll'
          if ($dlls.Count -eq 0) { Write-Error "No pr_*.dll built"; exit 1 }
          Write-Host "OK  $($dlls.Count) printer DLL(s)"

      - name: Read version from st\include\version.h
        id: ver
        shell: pwsh
        run: |
          $h = Get-Content st\include\version.h -Raw
          if ($h -notmatch '#define\s+ST_VERSION\s+"(\d+)\.(\d+)\.(\d+)"') {
            Write-Error 'Could not read ST_VERSION from st\include\version.h'
            exit 1
          }
          $v = "$($Matches[1]).$($Matches[2]).$($Matches[3])"
          Write-Host "Version: $v"
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Sanity-check tag matches version.h
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME.TrimStart('v')
          $headerVer = '${{ steps.ver.outputs.version }}'
          if ($tag -ne $headerVer) {
            Write-Error "Tag '$env:GITHUB_REF_NAME' does not match version.h ('$headerVer'). Did you forget bump-version.sh / .ps1?"
            exit 1
          }
          Write-Host "Tag and version.h agree: $tag"

      - name: Package release ZIP
        shell: pwsh
        run: |
          $name = "smarttar-${{ steps.ver.outputs.version }}"
          $stage = "out\$name"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item st\bin\st.exe        $stage\
          Copy-Item st\bin\pr_*.dll      $stage\
          Copy-Item st\bin\help.dat      $stage\
          Copy-Item st\bin\RES.DAT       $stage\
          Copy-Item st\bin\*.inf         $stage\
          Copy-Item vendor\pharlap\BIN\*.DLL    $stage\
          Compress-Archive -Path $stage -DestinationPath "out\$name.zip"
          Get-ChildItem out\

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/smarttar-${{ steps.ver.outputs.version }}.zip
          generate_release_notes: true
          body: |
            **SmartTar ${{ github.ref_name }}**

            Built by [GitHub Actions](../actions) from tag `${{ github.ref_name }}`
            against `st/include/version.h` ⇒ `${{ steps.ver.outputs.version }}`.

            Changelog: see [`st/versions.txt`](st/versions.txt).
            Release procedure: see [`RELEASING.md`](RELEASING.md).

      - name: Upload artifact (workflow_dispatch path)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: smarttar-${{ steps.ver.outputs.version }}-${{ github.sha }}
          path: out/smarttar-${{ steps.ver.outputs.version }}.zip
          retention-days: 14
