name: Build & Release

# Triggered by release tags (plain vX.Y.Z — no suffix). Checkpoint tags
# like v2.34.1-runnable-by-claude are intentionally skipped.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  # Manual run from the Actions tab — uploads a build artifact instead
  # of creating a Release. Useful for shaking down the pipeline.
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        type: choice
        default: demo
        options: [demo, dbg, eda, auto, prod]

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    runs-on: macos-latest
    # macOS runner — DOSBox-X Windows builds (mingw64 and VS Build) crash
    # when running Pharlap BCC286 on windows-latest (Server 2025). The
    # macOS build is confirmed working locally and on CI.

    env:
      # Bump when DOSBox-X cuts a new release worth tracking.
      # https://github.com/joncampbell123/dosbox-x/releases
      DOSBOX_X_VERSION: '2026.06.02'
      BUILD_VARIANT: ${{ inputs.variant || 'demo' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install DOSBox-X (macOS)
        shell: bash
        run: |
          arch=$(uname -m)
          case "$arch" in
            arm64)  suffix="arm64" ;;
            x86_64) suffix="x86_64" ;;
            *)      echo "Unknown arch: $arch"; exit 1 ;;
          esac
          version="$DOSBOX_X_VERSION"
          url="https://github.com/joncampbell123/dosbox-x/releases/download/dosbox-x-v$version/dosbox-x-macosx-${suffix}-$version.zip"
          echo "Downloading $url"
          curl -fsSL "$url" -o dosbox-x.zip
          unzip -q dosbox-x.zip -d dosbox-x-install
          exe=$(find dosbox-x-install -name 'dosbox-x' -type f | head -1)
          if [ -z "$exe" ]; then echo "dosbox-x binary not found"; exit 1; fi
          chmod +x "$exe"
          echo "DOSBOX_X=$exe" >> "$GITHUB_ENV"
          echo "Using: $exe ($arch)"

      - name: Point dosbox-x.conf mount at the CI workspace
        shell: bash
        run: |
          sed -i '' "s|^mount c \".*\"|mount c \"${{ github.workspace }}\"|" dosbox-x.conf
          echo "Active mount line:"
          grep '^mount c ' dosbox-x.conf

      - name: Build (${{ env.BUILD_VARIANT }} variant)
        timeout-minutes: 15
        shell: bash
        run: |
          # macOS CI runners have no physical display. Set SDL video driver
          # to dummy so DOSBox-X can run headless.
          export SDL_VIDEODRIVER=dummy
          export MAKE_HEADLESS_DEBUG=1
          ./build.sh "$BUILD_VARIANT"
          rc=$?
          echo "build.sh exit code: $rc"
          exit $rc

      - name: Diagnostics on build failure
        if: failure()
        shell: bash
        run: |
          echo '=== build.log (full, if present) ==='
          if [ -f build.log ]; then
            echo "size: $(wc -c < build.log) bytes"
            cat build.log
          else
            echo '(missing)'
          fi
          echo ''
          echo '=== dosbox-x stderr/stdout (if captured) ==='
          if [ -f dosbox-x-build.log ]; then
            cat dosbox-x-build.log
          else
            echo '(missing)'
          fi
          echo ''
          echo '=== dosbox-x.conf (post-mount-rewrite) ==='
          cat dosbox-x.conf
          echo ''
          echo '=== workspace contents ==='
          ls -la

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-failure-${{ github.run_id }}
          path: |
            build.log
            dosbox-x-build.log
            dosbox-x.conf
          if-no-files-found: warn
          retention-days: 7

      - name: Verify essential build artifacts
        shell: bash
        run: |
          required=(st/bin/st.exe st/bin/help.dat st/bin/RES.DAT)
          for p in "${required[@]}"; do
            if [ ! -f "$p" ]; then echo "Missing: $p"; exit 1; fi
            echo "OK  $p"
          done
          dlls=$(find st/bin -iname 'pr_*.dll' | wc -l)
          if [ "$dlls" -eq 0 ]; then echo "No pr_*.dll built"; exit 1; fi
          echo "OK  $dlls printer DLL(s)"

      - name: Read version from st/include/version.h
        id: ver
        shell: bash
        run: |
          v=$(grep '#define  *ST_VERSION  *"' st/include/version.h | sed 's/.*"\([0-9]*\.[0-9]*\.[0-9]*\)".*/\1/')
          if [ -z "$v" ]; then echo "Could not read ST_VERSION"; exit 1; fi
          echo "Version: $v"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Sanity-check tag matches version.h
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          headerVer="${{ steps.ver.outputs.version }}"
          if [ "$tag" != "$headerVer" ]; then
            echo "Tag '$GITHUB_REF_NAME' does not match version.h ('$headerVer'). Did you forget bump-version.sh / .ps1?"
            exit 1
          fi
          echo "Tag and version.h agree: $tag"

      - name: Package release ZIP
        shell: bash
        run: |
          name="smarttar-${{ steps.ver.outputs.version }}"
          stage="out/$name"
          mkdir -p "$stage"
          cp st/bin/st.exe      "$stage/"
          # Printer driver DLLs (DOS names are uppercase, macOS APFS may or
          # may not be case-sensitive; use both globs to be safe).
          cp st/bin/pr_*.{DLL,dll} "$stage/" 2>/dev/null || true
          cp st/bin/help.dat    "$stage/"
          cp st/bin/RES.DAT     "$stage/"
          cp st/bin/*.inf       "$stage/" 2>/dev/null || true
          # Pharlap runtime DLLs the BIND step binds against at runtime.
          cp vendor/pharlap/BIN/*.DLL "$stage/"
          cd out && zip -r "${name}.zip" "$name/"
          ls -la

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: out/smarttar-${{ steps.ver.outputs.version }}.zip
          generate_release_notes: true
          body: |
            **SmartTar ${{ github.ref_name }}**

            Built by [GitHub Actions](../actions) from tag `${{ github.ref_name }}`
            against `st/include/version.h` ⇒ `${{ steps.ver.outputs.version }}`.

            Changelog: see [`st/versions.txt`](st/versions.txt).
            Release procedure: see [`RELEASING.md`](RELEASING.md).

      - name: Upload artifact (workflow_dispatch path)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: smarttar-${{ steps.ver.outputs.version }}-${{ github.sha }}
          path: out/smarttar-${{ steps.ver.outputs.version }}.zip
          retention-days: 14
