; demo.ini -- DEMO_ENGINE arrival generator config
;
; Loaded at startup when ENGINE_KIND=demo.  Defaults apply if file
; is missing or a key is absent.
;
[GLOBAL]
seed              = 0    ; RNG seed (0 = built-in default)
calls_per_minute  = 6    ; aggregate arrival rate across all booths
;
[LOCAL]
weight            = 70   ; share of arrivals (out of total weight)
min_duration_secs = 30
max_duration_secs = 300
;
[NAL]
weight            = 25
min_duration_secs = 60
max_duration_secs = 600
;
[INTER]
weight            = 5
min_duration_secs = 120
max_duration_secs = 900
