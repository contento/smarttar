# SmartTar — DOSBox-X project configuration
#
# Auto-loaded by DOSBox-X when launched from this directory, or
# explicitly:
#
#     dosbox-x -conf dosbox-x.conf
#
# To layer on top of a personal base config:
#
#     dosbox-x -conf ~/dosbox-x.conf -conf ./dosbox-x.conf
#
# Only [autoexec] is populated — machine / CPU / video / sound
# defaults are left to DOSBox-X (or your base config). Adjust the
# mount line below to match where the project lives on your host.

[autoexec]
@echo off

REM --- Mount the project root as C: ---
REM Uncomment ONE of the lines below (or substitute your own path):
REM mount c "/Users/contento/Projects/contento/smarttar"
REM mount c "C:\Projects\smarttar"

c:

REM --- Put util/ subdirectories on PATH ---
REM   C:\UTIL          -> ASTYLE.EXE, SWEEP.COM
REM   C:\UTIL\NC       -> Norton Commander (NC.EXE, NCEDIT.EXE, NCFF.EXE, ...)
REM   C:\UTIL\Q        -> QEdit (Q.EXE, QMAC.EXE, QCP.EXE)
REM   C:\UTIL\PKWARE   -> PKZIP / PKUNZIP / PKLITE / ZIP2EXE / ...
REM   C:\UTIL\MOUSE    -> Microsoft Mouse IntelliPoint driver (rarely needed; see note)
set PATH=%PATH%;C:\UTIL;C:\UTIL\NC;C:\UTIL\Q;C:\UTIL\PKWARE;C:\UTIL\MOUSE

echo.
echo SmartTar utilities on PATH: NC, Q, ASTYLE, SWEEP, PKZIP/PKUNZIP/PKLITE
echo.
