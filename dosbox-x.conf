# SmartTar — DOSBox-X project configuration
#
# Auto-loaded by DOSBox-X when launched from this directory, or
# explicitly:
#
#     dosbox-x -conf dosbox-x.conf
#
# To layer on top of a personal base config:
#
#     dosbox-x -conf ~/dosbox-x.conf -conf ./dosbox-x.conf
#
# Settings below target the historical SmartTar runtime: 386 hardware,
# DOS 5.0, Pharlap 286 protected mode, Zinc 3.5 (BGI graphics),
# Borland C++ 3.1. Adjust the host mount path in [autoexec].

[dosbox]
# Zinc 3.5 draws through Borland BGI — svga_s3 is the safe superset
# that covers VGA/EGA/CGA modes as well. Bump RAM so Pharlap's LDT,
# extended-memory heap, and a comfortable build cache all fit.
machine = svga_s3
memsize = 32

[cpu]
# Pharlap 286 uses 286-protected instructions on 386 hardware (per
# CLAUDE.md). cycles=max unleashes the host CPU instead of letting
# DOSBox-X's auto-mode throttle real-mode code — important for build
# throughput. core=auto is conservative: on arm64 the dynamic JIT has
# historically had issues with 286 protected mode, so we don't force it.
cputype = 386
core = auto
cycles = max

[dos]
# Report DOS 5.0 to apps that probe via INT 21h/AH=30h. Disable LFN
# so 8.3 violations surface immediately rather than being masked.
ver = 5.0
lfn = false

[config]
# Borland MAKE pipelines BCC286 / TASM / TLINK and each step opens
# many headers and libraries. Generous handles avoid hitting DOS
# file-handle limits mid-build.
files = 40
buffers = 30

[autoexec]
@echo off

REM --- Default to "yes" on MOVE / COPY overwrite prompts ---
REM Without this, rebuilds stall on every MOVE in the .c.dll rule
REM because build\pr_*.obj etc. already exist.
set COPYCMD=/Y

REM --- Mount the project root as C: ---
REM Use ONE of the lines below (comment the other when switching hosts):
mount c "/Users/contento/Projects/contento/smarttar"
REM mount c "c:/users/contento/projects/contento/smarttar"

c:

REM --- Toolchain on PATH (required to build) ---
REM   C:\BC\BIN        : Borland C++ 3.1 (BCC, TASM, TLINK, TLIB, MAKE, TD, ...)
REM   C:\PHARLAP\BIN   : Pharlap 286 (BCC286, BIND286, CFIG286, RUN286, ...)
REM   C:\ZINC\BIN      : Zinc 3.5 tools (GENHELP.EXE for the HELP=1 rule;
REM                      also Zinc Designer if launched interactively).
REM                      Zinc headers/libs are wired via -I/-L in st\st.cfg.
set PATH=C:\BC\BIN;C:\PHARLAP\BIN;C:\ZINC\BIN;%PATH%

REM --- util/ subdirectories on PATH ---
REM   C:\UTIL          : ASTYLE.EXE, SWEEP.COM
REM   C:\UTIL\NC       : Norton Commander (NC.EXE, NCEDIT.EXE, NCFF.EXE, ...)
REM   C:\UTIL\Q        : QEdit (Q.EXE, QMAC.EXE, QCP.EXE)
REM   C:\UTIL\PKWARE   : PKZIP / PKUNZIP / PKLITE / ZIP2EXE / ...
REM   C:\UTIL\MOUSE    : Microsoft Mouse IntelliPoint driver (rarely needed)
set PATH=%PATH%;C:\UTIL;C:\UTIL\NC;C:\UTIL\Q;C:\UTIL\PKWARE;C:\UTIL\MOUSE

REM --- Drop straight into the source directory for make / run ---
REM (guarded so an unmounted / wrong-path launch still lands somewhere usable)
if exist ST\nul cd ST

echo.
echo SmartTar build environment ready.
echo   make*.bat        : makedemo / makedebug / makeeda / makeauto / makeprod
echo   run              : launch bin\st.exe after building
echo.
